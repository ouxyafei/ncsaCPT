<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSCA-CPT 学习工具箱</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #1e1e1e;
  --card: #ffffff;
  --card-alt: #f8f9fa;
  --accent: #ff6b35;
  --accent-hover: #e85d2c;
  --accent-light: rgba(255,107,53,0.1);
  --text: #e0e0e0;
  --text-dark: #2d2d2d;
  --text-muted: #6c757d;
  --border: #dee2e6;
  --success: #28a745;
  --danger: #dc3545;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --radius: 10px;
  --transition: 0.25s ease;
  --nav-height: 56px;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
h2 { font-size: 1.5rem; margin-bottom: 0.75rem; color: var(--text-dark); }
h3 { font-size: 1.15rem; margin-bottom: 0.5rem; color: var(--text-dark); }
p { margin-bottom: 0.5rem; }
button { cursor: pointer; font-family: inherit; }

/* ===== Navigation ===== */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: #161616;
  border-bottom: 2px solid var(--accent);
  display: flex;
  justify-content: center;
  gap: 2px;
  padding: 0 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-btn {
  background: none; border: none; color: #aaa;
  font-size: 0.85rem; font-weight: 600;
  padding: 16px 14px;
  white-space: nowrap;
  transition: var(--transition);
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
}
.nav-btn:hover { color: #fff; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ===== Main ===== */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}
.module { display: none; }
.module.active { display: block; }

/* ===== Cards ===== */
.card {
  background: var(--card);
  color: var(--text-dark);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

/* ===== Accordion ===== */
.accordion { border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; background: var(--card); box-shadow: var(--shadow); }
.accordion-header {
  width: 100%; background: var(--card); border: none;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; font-size: 1rem; font-weight: 700;
  color: var(--text-dark); text-align: left;
  transition: background var(--transition);
}
.accordion-header:hover { background: #f0f0f0; }
.accordion-header .arrow { transition: transform var(--transition); font-size: 0.7rem; }
.accordion-header.open .arrow { transform: rotate(180deg); }
.accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.accordion-body.open { max-height: 5000px; }
.accordion-content { padding: 0 20px 20px; }
.sub-accordion { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.sub-accordion-header {
  width: 100%; background: var(--card-alt); border: none;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; font-size: 0.9rem; font-weight: 600;
  color: var(--text-dark); text-align: left;
  transition: background var(--transition);
}
.sub-accordion-header:hover { background: #eef0f2; }
.sub-accordion-header .arrow { font-size: 0.65rem; transition: transform var(--transition); }
.sub-accordion-header.open .arrow { transform: rotate(180deg); }
.sub-accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.sub-accordion-body.open { max-height: 3000px; }
.sub-accordion-content { padding: 0 16px 16px; }

.knowledge-list { list-style: none; }
.knowledge-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 0.9rem;
  line-height: 1.5;
}
.knowledge-list li:last-child { border-bottom: none; }
.knowledge-list .bullet {
  flex-shrink: 0; width: 8px; height: 8px; margin-top: 6px;
  background: var(--accent); border-radius: 50%;
}
.fav-star {
  flex-shrink: 0; background: none; border: none; font-size: 1.2rem;
  cursor: pointer; transition: transform 0.15s; line-height: 1; padding: 0; margin-left: 4px;
}
.fav-star:hover { transform: scale(1.3); }
.fav-star.favorited { color: var(--accent); }

/* Favorites Panel */
.favorites-toggle {
  position: fixed; right: 16px; bottom: 80px; z-index: 200;
  width: 48px; height: 48px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 50%; font-size: 1.3rem;
  box-shadow: 0 4px 16px rgba(255,107,53,0.4);
  transition: transform var(--transition);
}
.favorites-toggle:hover { transform: scale(1.1); }
.favorites-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.6);
  display: none; justify-content: center; align-items: center;
}
.favorites-overlay.show { display: flex; }
.favorites-panel {
  background: var(--card); color: var(--text-dark);
  border-radius: var(--radius); padding: 24px;
  max-width: 500px; width: 90%; max-height: 70vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.favorites-panel h3 { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.favorites-panel h3 button { background: none; border: none; font-size: 1.3rem; color: var(--text-muted); }
.favorites-panel h3 button:hover { color: var(--text-dark); }
.favorites-panel .empty { color: var(--text-muted); text-align: center; padding: 30px 0; }

/* ===== Flashcard ===== */
.flashcard-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.flashcard-scene {
  width: 100%; max-width: 450px; height: 300px;
  perspective: 1000px; cursor: pointer;
}
.flashcard-inner {
  width: 100%; height: 100%;
  position: relative;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style: preserve-3d;
}
.flashcard-inner.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex; justify-content: center; align-items: center;
  padding: 32px; text-align: center;
  box-shadow: var(--shadow);
}
.flashcard-front {
  background: var(--card);
  font-size: 1.4rem; font-weight: 700; color: var(--text-dark);
  border: 3px solid var(--accent);
}
.flashcard-front .flip-hint {
  position: absolute; bottom: 16px; font-size: 0.75rem; font-weight: 400; color: var(--text-muted);
}
.flashcard-back {
  background: #2d2d2d; color: #f0f0f0;
  transform: rotateY(180deg);
  font-size: 1rem; line-height: 1.6;
  border: 3px solid var(--accent);
}
.flashcard-counter { font-size: 0.85rem; color: var(--text-muted); }
.flashcard-nav { display: flex; gap: 12px; }
.flashcard-nav button {
  padding: 10px 24px; border-radius: 6px; font-size: 0.9rem; font-weight: 600;
  border: none; background: var(--accent); color: #fff; transition: background var(--transition);
}
.flashcard-nav button:hover { background: var(--accent-hover); }
.flashcard-nav button:active { transform: scale(0.97); }

/* ===== Quiz ===== */
.quiz-question { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: var(--text-dark); }
.quiz-options { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.quiz-options li { }
.quiz-option {
  width: 100%; text-align: left; padding: 14px 16px;
  border: 2px solid var(--border); border-radius: 8px;
  background: #fff; font-size: 0.95rem;
  transition: all var(--transition);
}
.quiz-option:not(.disabled):hover { border-color: var(--accent); background: var(--accent-light); }
.quiz-option.correct { border-color: var(--success); background: #d4edda; color: #155724; }
.quiz-option.incorrect { border-color: var(--danger); background: #f8d7da; color: #721c24; }
.quiz-option.disabled { pointer-events: none; opacity: 0.85; }
.quiz-explanation { margin-top: 12px; padding: 12px 16px; background: #eef6ff; border-radius: 8px; font-size: 0.9rem; color: #1a5276; display: none; }
.quiz-explanation.show { display: block; }
.quiz-next { display: none; margin-top: 16px; }
.quiz-next.show { display: inline-block; }
.quiz-score { text-align: center; padding: 30px 0; }
.quiz-score .score-big { font-size: 3rem; font-weight: 800; color: var(--accent); }
.quiz-review { margin-top: 20px; }
.quiz-review .review-item {
  padding: 14px 16px; border-radius: 8px; margin-bottom: 10px;
  border-left: 4px solid var(--danger);
}

/* ===== Exercise ===== */
.exercise-filter { margin-bottom: 20px; }
.exercise-filter select {
  padding: 10px 16px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; background: #fff; width: 100%; max-width: 300px;
}
.exercise-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.exercise-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.exercise-img {
  height: 140px; display: flex; justify-content: center; align-items: center;
  font-size: 1rem; font-weight: 700; color: #fff; text-align: center; padding: 16px;
}
.exercise-info { padding: 16px; }
.exercise-info h4 { font-size: 1rem; margin-bottom: 8px; color: var(--text-dark); }
.exercise-info ul { list-style: none; font-size: 0.85rem; color: #555; }
.exercise-info ul li { margin-bottom: 4px; padding-left: 12px; position: relative; }
.exercise-info ul li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }

/* ===== Calculator ===== */
.calc-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.calc-tab {
  padding: 10px 20px; border: 2px solid var(--border); border-radius: 8px;
  background: #fff; font-weight: 600; font-size: 0.9rem; transition: all var(--transition);
}
.calc-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.calc-tab:hover:not(.active) { border-color: var(--accent); }
.calc-panel { display: none; }
.calc-panel.active { display: block; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text-dark); font-size: 0.9rem; }
.form-group input, .form-group select {
  width: 100%; max-width: 360px; padding: 10px 14px;
  border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.form-error { color: var(--danger); font-size: 0.85rem; margin-top: 4px; display: none; }
.form-error.show { display: block; }
.calc-result { margin-top: 16px; padding: 18px; background: #eef6ff; border-radius: 8px; display: none; }
.calc-result.show { display: block; }
.calc-result .result-value { font-size: 2rem; font-weight: 800; color: var(--accent); }
.calc-result .result-label { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }
.hr-zone { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }

/* ===== Study Log ===== */
.log-section { margin-bottom: 24px; }
.log-section h3 { margin-bottom: 12px; color: var(--text-dark); }
.study-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.study-form .form-group { margin-bottom: 0; flex: 1; min-width: 160px; }
.study-form input { width: 100%; }
.log-list { list-style: none; }
.log-list li {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid #eee; font-size: 0.9rem;
}
.log-list li:last-child { border-bottom: none; }
.log-empty { color: var(--text-muted); text-align: center; padding: 20px 0; }
.log-clear { margin-top: 12px; }
.log-clear button { padding: 8px 16px; background: var(--danger); color: #fff; border: none; border-radius: 6px; font-size: 0.85rem; }

/* ===== Buttons ===== */
.btn-primary {
  padding: 10px 24px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
  transition: background var(--transition);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  padding: 10px 24px; background: #fff; color: var(--accent);
  border: 2px solid var(--accent); border-radius: 8px; font-size: 0.9rem; font-weight: 600;
  transition: all var(--transition);
}
.btn-secondary:hover { background: var(--accent-light); }

/* ===== Responsive ===== */
@media (max-width: 767px) {
  .nav { justify-content: flex-start; }
  .nav-btn { font-size: 0.78rem; padding: 14px 10px; }
  .flashcard-scene { height: 240px; }
  .flashcard-front { font-size: 1.1rem; }
  .flashcard-back { font-size: 0.85rem; }
  .exercise-grid { grid-template-columns: 1fr; }
  .favorites-toggle { right: 10px; bottom: 60px; width: 42px; height: 42px; font-size: 1.1rem; }
  .quiz-score .score-big { font-size: 2.2rem; }
}
</style>
</head>
<body>

<!-- Navigation -->
<nav class="nav" id="nav">
  <button class="nav-btn active" data-tab="knowledge">📚 知识库</button>
  <button class="nav-btn" data-tab="flashcard">🃏 闪卡</button>
  <button class="nav-btn" data-tab="quiz">📝 测验</button>
  <button class="nav-btn" data-tab="exercise">🏋️ 动作库</button>
  <button class="nav-btn" data-tab="calculator">🔢 计算器</button>
  <button class="nav-btn" data-tab="log">📊 学习日志</button>
</nav>

<!-- Main Content -->
<main class="main" id="main">

  <!-- Module 1: Knowledge Base -->
  <section class="module active" id="module-knowledge">
    <div class="card"><h2>NSCA-CPT 核心知识库</h2><p style="color:var(--text-muted)">点击领域标题展开，点击 ⭐ 收藏重点知识点。已整理 4 大领域、50+ 核心知识点。</p></div>
    <div id="knowledge-container"></div>
  </section>

  <!-- Module 2: Flashcard -->
  <section class="module" id="module-flashcard">
    <div class="card flashcard-container">
      <h2>闪卡记忆</h2>
      <p style="color:var(--text-muted)">点击卡片翻转查看定义，使用按钮随机抽取新卡片</p>
      <div class="flashcard-counter" id="flashcard-counter">1 / 40+</div>
      <div class="flashcard-scene" id="flashcard-scene">
        <div class="flashcard-inner" id="flashcard-inner">
          <div class="flashcard-face flashcard-front">
            <span id="flashcard-term">点击开始</span>
            <span class="flip-hint">点击翻转</span>
          </div>
          <div class="flashcard-face flashcard-back">
            <span id="flashcard-def"></span>
          </div>
        </div>
      </div>
      <div class="flashcard-nav">
        <button id="flashcard-prev">◀ 上一张</button>
        <button id="flashcard-next">下一张 ▶</button>
      </div>
    </div>
  </section>

  <!-- Module 3: Quiz -->
  <section class="module" id="module-quiz">
    <div class="card">
      <h2>随堂测验</h2>
      <p style="color:var(--text-muted)">每次随机抽取 10 道单选题，即时反馈，完成后查看得分与错题解析</p>
      <div id="quiz-content">
        <button class="btn-primary" id="quiz-start">开始测验</button>
      </div>
    </div>
  </section>

  <!-- Module 4: Exercise Library -->
  <section class="module" id="module-exercise">
    <div class="card">
      <h2>动作库</h2>
      <p style="color:var(--text-muted)">按肌群筛选，查看动作指导要点</p>
      <div class="exercise-filter">
        <select id="exercise-filter">
          <option value="all">全部肌群</option>
          <option value="胸部">胸部</option>
          <option value="背部">背部</option>
          <option value="腿部">腿部</option>
          <option value="肩部">肩部</option>
          <option value="核心">核心</option>
          <option value="手臂">手臂</option>
        </select>
      </div>
      <div class="exercise-grid" id="exercise-grid"></div>
    </div>
  </section>

  <!-- Module 5: Calculator -->
  <section class="module" id="module-calculator">
    <div class="card">
      <h2>训练计算器</h2>
      <div class="calc-tabs">
        <button class="calc-tab active" data-calc="rm">1RM 计算器</button>
        <button class="calc-tab" data-calc="hr">目标心率计算器</button>
      </div>
      <!-- 1RM -->
      <div class="calc-panel active" id="calc-rm">
        <div class="form-group">
          <label for="rm-weight">使用的重量 (kg)</label>
          <input type="number" id="rm-weight" placeholder="例如: 60" min="0.5" step="0.5">
        </div>
        <div class="form-group">
          <label for="rm-reps">最多重复次数</label>
          <input type="number" id="rm-reps" placeholder="例如: 8" min="1" step="1">
        </div>
        <div class="form-error" id="rm-error"></div>
        <button class="btn-primary" id="rm-calc">计算 1RM</button>
        <div class="calc-result" id="rm-result">
          <div class="result-value" id="rm-value"></div>
          <div class="result-label">估算 1RM (Epley 公式)</div>
        </div>
      </div>
      <!-- Target HR -->
      <div class="calc-panel" id="calc-hr">
        <div class="form-group">
          <label for="hr-age">年龄</label>
          <input type="number" id="hr-age" placeholder="例如: 25" min="1" max="100">
        </div>
        <div class="form-group">
          <label for="hr-intensity">强度百分比</label>
          <select id="hr-intensity">
            <option value="">-- 请选择 --</option>
            <option value="50-60">50% - 60%（热身/恢复）</option>
            <option value="60-70">60% - 70%（燃脂/有氧）</option>
            <option value="70-80">70% - 80%（心肺强化）</option>
            <option value="80-90">80% - 90%（高强度训练）</option>
          </select>
        </div>
        <div class="form-error" id="hr-error"></div>
        <button class="btn-primary" id="hr-calc">计算目标心率</button>
        <div class="calc-result" id="hr-result">
          <div class="result-value" id="hr-value"></div>
          <div class="result-label" id="hr-label"></div>
          <span class="hr-zone" id="hr-zone"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- Module 6: Study Log -->
  <section class="module" id="module-log">
    <div class="card">
      <h2>学习日志</h2>
      <!-- Manual time logging -->
      <div class="log-section">
        <h3>📝 记录学习时长</h3>
        <div class="study-form">
          <div class="form-group">
            <label for="study-minutes">学习时长（分钟）</label>
            <input type="number" id="study-minutes" placeholder="例如: 45" min="1">
          </div>
          <button class="btn-primary" id="study-save">保存记录</button>
        </div>
      </div>
      <!-- Log list -->
      <div class="log-section">
        <h3>📋 最近记录</h3>
        <ul class="log-list" id="log-list"></ul>
        <div class="log-empty" id="log-empty" style="display:none">暂无记录，完成测验或手动记录学习时长后会显示在这里</div>
        <div class="log-clear">
          <button id="log-clear">清除所有记录</button>
        </div>
      </div>
    </div>
  </section>

</main>

<!-- Favorites floating button -->
<button class="favorites-toggle" id="favorites-toggle" title="我的收藏">⭐</button>

<!-- Favorites overlay -->
<div class="favorites-overlay" id="favorites-overlay">
  <div class="favorites-panel" id="favorites-panel">
    <h3>
      我的收藏
      <button id="favorites-close">&times;</button>
    </h3>
    <div id="favorites-list"></div>
  </div>
</div>

<script>
'use strict';

/* ===== DATA: Knowledge Base ===== */
const KNOWLEDGE_DATA = [
  {
    id: 'd1', title: '领域一：客户咨询与运动评估',
    topics: [
      {
        id: 't1-1', title: '解剖与生理基础',
        points: [
          {id:'kp1',text:'运动单位由α运动神经元及其支配的所有肌纤维组成。精细动作的运动单位支配较少肌纤维（如眼肌约10条），大肌肉的运动单位可支配数百至上千条肌纤维（如股四头肌）。'},
          {id:'kp2',text:'肌纤维类型：I型（慢缩氧化型）收缩速度慢、力量小、耐力强，适合长时间有氧运动；IIa型（快缩氧化酵解型）兼具力量与耐力；IIx/IIb型（快缩酵解型）收缩速度快、力量大、易疲劳，适合爆发力输出。'},
          {id:'kp3',text:'滑动丝理论：肌纤维收缩时，肌球蛋白头与肌动蛋白丝结合形成"横桥"，通过ATP水解供能，拉动肌动蛋白丝沿肌球蛋白丝滑动，使肌小节缩短。此过程为"兴奋-收缩耦联"，核心是钙离子(Ca²⁺)释放触发。'},
          {id:'kp4',text:'心血管系统对运动的反应：运动时交感神经兴奋→心率↑、每搏输出量↑、心输出量↑。心输出量(CO)=心率(HR)×每搏输出量(SV)。静息CO约5L/min，最大运动时可达20-40L/min。'},
          {id:'kp5',text:'三大供能系统：(1)磷酸原系统(ATP-PC)：立即供能，持续约6-10秒，高强度爆发（如冲刺、跳跃）；(2)糖酵解：快速供能，持续约30秒-2分钟，无需氧气，产物含乳酸；(3)氧化系统：缓慢供能，需氧气，可长时间运行，利用碳水化合物和脂肪。'}
        ]
      },
      {
        id: 't1-2', title: '人体运动平面与关节动作',
        points: [
          {id:'kp6',text:'矢状面将身体分为左右两部分，该平面上的运动包括屈曲(flexion)和伸展(extension)。典型动作：肱二头肌弯举、深蹲、弓步、跑步的前后摆腿。'},
          {id:'kp7',text:'冠状面将身体分为前后两部分，该平面上的运动包括外展(abduction)和内收(adduction)。典型动作：哑铃侧平举、引体向上时手臂外展、侧弓步。'},
          {id:'kp8',text:'水平面将身体分为上下两部分，该平面上的运动包括旋转(rotation)和水平屈伸。典型动作：俄罗斯转体、胸大肌飞鸟的水平屈、高尔夫挥杆。'},
          {id:'kp9',text:'关节动作总结：屈(flexion)=减小关节角度；伸(extension)=增大关节角度；外展(abduction)=远离身体中线；内收(adduction)=靠近身体中线；旋转(rotation)=绕长轴转动；回旋(circumduction)=锥形运动。'}
        ]
      },
      {
        id: 't1-3', title: '核心肌肉起止点与功能',
        points: [
          {id:'kp10',text:'腹直肌：起于耻骨嵴，止于第5-7肋软骨和剑突。功能为脊柱屈曲、骨盆后倾，维持腹部压力。薄弱或松弛可导致下交叉综合征中骨盆前倾的代偿。'},
          {id:'kp11',text:'竖脊肌群（髂肋肌、最长肌、棘肌）：沿脊柱两侧分布，起于骶骨和髂骨，止于肋骨、椎骨和颅骨。功能为脊柱伸展和侧屈，维持直立姿势，是核心稳定的关键后链肌肉。'},
          {id:'kp12',text:'臀大肌：起于髂骨、骶骨和尾骨，止于股骨臀肌粗隆和髂胫束。功能为髋关节伸展和髋外旋，是人体最大的肌肉，在深蹲、硬拉、冲刺跑中提供主要驱动力。'},
          {id:'kp13',text:'核心包括29块肌肉，不仅指腹肌，还包括膈肌（呼吸与腹内压调节）、盆底肌（内脏支撑）、多裂肌（脊柱节段稳定）、腹横肌（深层腹壁稳定，最先激活的核心肌群之一）。'}
        ]
      },
      {
        id: 't1-4', title: '体态评估与常见偏差',
        points: [
          {id:'kp14',text:'上交叉综合征：表现为头部前倾、圆肩（肱骨内旋）、胸椎后凸增加。过紧肌群：胸大肌、胸小肌、上斜方肌、肩胛提肌。过弱肌群：深层颈屈肌、中下斜方肌、菱形肌。纠正思路：松解紧张肌群，加强薄弱肌群。'},
          {id:'kp15',text:'下交叉综合征：表现为腰椎前凸增加、骨盆前倾。过紧肌群：髋屈肌群（髂腰肌、股直肌）、竖脊肌群下段。过弱肌群：腹直肌、腹横肌、臀大肌、腘绳肌。纠正思路：放松髋屈肌，激活并加强臀部和腹部肌群。'},
          {id:'kp16',text:'平背姿势：腰椎前凸减小，骨盆后倾。常见于久坐人群和老年人。可能伴随腘绳肌紧张和腹肌过度紧张。纠正思路：增加胸椎和髋关节灵活性，加强竖脊肌和髋屈肌。'},
          {id:'kp17',text:'体态评估的静态观察要点：侧面观检查耳、肩峰、大转子、膝关节外侧踝、外踝的相对排列（铅垂线）。正面/背面观检查头颈偏歪、肩高不对称、脊柱侧弯、骨盆倾斜、膝内外翻、足弓形态。'}
        ]
      },
      {
        id: 't1-5', title: '健康评估工具',
        points: [
          {id:'kp18',text:'PAR-Q（体力活动准备问卷）：运动前筛查工具，包含7个问题，涉及心脏状况、胸痛、眩晕、关节问题等。任何问题回答"是"→建议转介医生进行进一步评估。适合15-69岁人群。更新版PAR-Q+包含更多分层问题。'},
          {id:'kp19',text:'静息心率测量规范：测量部位为桡动脉或颈动脉，应在患者静坐至少5分钟后进行，测量30秒×2或完整60秒。正常成人范围60-100次/分钟，训练有素的运动员可低至40次/分钟以下。'},
          {id:'kp20',text:'血压测量规范：使用合适大小的袖带（气囊宽度为臂围的40%，长度为臂围的80%）。患者坐姿、腿不交叉、手臂支撑于心脏水平。正常值<120/<80 mmHg。高血压标准≥130/≥80 mmHg（ACC/AHA 2017）。'},
          {id:'kp21',text:'1RM测试流程：(1)受试者充分热身，进行轻重量5-10次→中等重量3-5次→接近最大重量1-2次；(2)逐步加重，每次尝试间休息3-5分钟；(3)理想在3-5次尝试内找到1RM；(4)必须配置保护者(spotter)；(5)不适合无训练经验的初学者，可使用多RM预测公式替代。'},
          {id:'kp22',text:'BMI（身体质量指数）= 体重(kg) / 身高²(m²)。分类：<18.5偏瘦；18.5-24.9正常；25-29.9超重；≥30肥胖。局限性：不区分肌肉和脂肪，运动员可能误判为超重。需结合体脂率、腰臀比等进行综合评估。'}
        ]
      }
    ]
  },
  {
    id: 'd2', title: '领域二：训练计划设计',
    topics: [
      {
        id: 't2-1', title: 'OPT模型五个阶段',
        points: [
          {id:'kp23',text:'OPT模型第1阶段（稳定性耐力）：目标为改善肌肉耐力、关节稳定性、姿势控制。强度：低负荷，50-70% 1RM，重复12-20次，1-3组。节奏：慢速4/2/1。在不稳定平面上训练（如平衡盘、瑞士球），重点激活核心和稳定肌群。'},
          {id:'kp24',text:'OPT模型第2阶段（力量耐力）：目标为提高工作容量和抗疲劳能力。采用超级组训练：同一肌群先做传统力量训练（8-12次，70-80% 1RM），紧接着做稳定性训练（12-20次，中等节奏）。组间休息45-90秒。'},
          {id:'kp25',text:'OPT模型第3阶段（肌肥大）：目标为增加肌肉横截面积。强度：75-85% 1RM，重复8-12次，3-5组。动作节奏2/0/2。组间休息60-90秒。训练量较高（总组数多），需要配合热量盈余和充足蛋白质摄入（约1.6-2.2g/kg/天）。'},
          {id:'kp26',text:'OPT模型第4阶段（最大力量）：目标为提升峰值力输出。强度：85-100% 1RM，重复1-6次，4-6组。组间休息3-5分钟以充分恢复神经系统。适合有至少1年系统训练基础的运动员，初学者不应进入此阶段。'},
          {id:'kp27',text:'OPT模型第5阶段（爆发力）：目标为提高力-速度关系（爆发力=力×速度）。采用复合训练：先用大重量力量训练（85-100% 1RM，1-5次），紧接爆发性动作（如药球投掷、跳箱，30-45% 1RM或自身体重）。每个配对休息3-5分钟。'}
        ]
      },
      {
        id: 't2-2', title: '柔韧性与核心训练',
        points: [
          {id:'kp28',text:'柔韧性训练的三种类型：(1)主动分离式拉伸(AIS)：利用主动肌收缩带动拮抗肌拉伸，保持1-2秒，重复多次，适合热身时使用；(2)动态拉伸：通过完整关节活动范围进行可控运动（如腿摆动、行进箭步），适合运动前准备；(3)静态拉伸：保持拉伸位置15-60秒，适合运动后进行以改善柔韧性，运动前过度静态拉伸可能影响力量输出。'},
          {id:'kp29',text:'核心训练三个水平：(1)核心稳定：强调脊柱在中立位下的静态保持，如平板支撑、侧桥、死虫式；(2)核心力量：在稳定的脊柱基础上对抗动态力，如药球卷腹、绳索伐木、背部伸展；(3)核心爆发：快速传递力量通过核心，如药球过顶投掷、旋转药球抛墙、跳箱。'},
          {id:'kp30',text:'拉伸的黄金时机：训练前→动态拉伸或主动分离式拉伸5-10分钟，提高组织温度、激活神经肌肉接头；训练中→短暂静态拉伸过度紧张肌群（约10秒）；训练后→静态拉伸15-30秒×2-3组，每个主要肌群，利用体温高的窗口期增加柔韧性。'}
        ]
      },
      {
        id: 't2-3', title: '训练原则与变量',
        points: [
          {id:'kp31',text:'SAID原则（对强加需求的特定适应）：身体会对施加的特定刺激产生适应性变化。例如，要变强→练大重量；要变耐力好→练多次数；要变快→练爆发动作。训练的特异性决定了适应的方向。'},
          {id:'kp32',text:'超量恢复理论：训练后身体经历三个时期——警觉期（疲劳、暂时性能力下降）→抵抗期（恢复并超过原有水平）→衰竭期（若无新刺激则回落至基线）。下一次训练应安排在超量恢复峰值附近，以获得最大训练效益。'},
          {id:'kp33',text:'渐进超负荷原则：随着身体适应现有训练负荷，必须逐步增加训练变量以持续刺激进步。增加方式包括：增加重量（强度↑）、增加次数/组数（训练量↑）、缩短休息间隔（密度↑）、增加训练频率（每周次数↑）、增加ROM或速度。建议每1-3周微调。'},
          {id:'kp34',text:'训练量与强度的平衡：训练量(Ton)=组数×次数×重量；训练强度通常以%1RM表示。高强度（>85% 1RM）时训练量应降低以管理疲劳和避免过度训练；中等强度时（70-85% 1RM）可适当增加训练量以促进肌肥大。两者呈反J曲线关系。'},
          {id:'kp35',text:'容量负荷是衡量训练总量的指标：容量负荷 = 组数 × 次数 × 重量(kg)。例如，3组×10次×60kg = 1800kg。监控周间容量负荷变化（建议每周增量5-10%），避免负荷过度增加导致软组织损伤。'}
        ]
      },
      {
        id: 't2-4', title: '速度、敏捷与营养',
        points: [
          {id:'kp36',text:'速度与敏捷训练的基本要素：(1)加速能力（从0到最大速度的速率，约前10-30米）；(2)最大速度（达到最高跑速后的维持能力，约30-60米区间）；(3)减速与制动控制（降低受伤风险的关键）；(4)变向能力（敏捷的核心—识别刺激→刹车→重新加速→变向）。训练需包含直线速度+多方向敏捷。'},
          {id:'kp37',text:'补水建议：运动前2-3小时饮水500-600ml；运动中每15-20分钟饮用200-300ml；运动后每流失1kg体重补充1.25-1.5L液体。尿液颜色是简单有效的自我监测工具（目标为浅黄色）。电解质补充在持续>60分钟的高强度运动中尤为重要。'},
          {id:'kp38',text:'营养时机建议：运动前1-4小时进食含碳水+适量蛋白质的餐食（碳水1-4g/kg，蛋白质0.25-0.4g/kg）；运动中若持续>60分钟，每小时补充30-60g碳水；运动后30-60分钟窗口内补充碳水(1-1.5g/kg)+蛋白质(0.3-0.4g/kg)，比例约3:1至4:1。'}
        ]
      }
    ]
  },
  {
    id: 'd3', title: '领域三：运动技术',
    topics: [
      {
        id: 't3-1', title: '抗阻训练动作分类',
        points: [
          {id:'kp39',text:'基础力量动作（多关节、大肌群、高神经肌肉需求）：杠铃深蹲、传统硬拉、杠铃卧推、杠铃肩推、引体向上、杠铃划船。这些动作是训练计划的核心，应优先安排在训练课的前半段（疲劳前）。'},
          {id:'kp40',text:'全身爆发性动作：高翻(Clean)、抓举(Snatch)、推举(Jerk)、哑铃抓举、壶铃摆举。这些动作训练力-速度曲线，需要高技术水平，通常安排在热身之后、大重量力量训练之前。'},
          {id:'kp41',text:'辅助/隔离动作（单关节、小肌群）：肱二头肌弯举、三头绳索下压、侧平举、腿弯举、小腿提踵。用于补充和针对性加强薄弱环节，通常在训练课后半段执行。组数和次数范围较灵活。'},
          {id:'kp42',text:'核心训练的进展模式：从稳定→力量→爆发逐级过渡。始终确保在进入下个级别之前，客户能维持脊柱中立位并控制呼吸。例如：平板支撑(稳定)→药球卷腹(力量)→旋转药球抛墙(爆发)。'}
        ]
      },
      {
        id: 't3-2', title: '常见动作技术要点',
        points: [
          {id:'kp43',text:'深蹲技术关键点：脚与肩同宽或略宽，脚尖略向外（约5-15°）。下蹲时膝盖方向与脚尖一致，髋向后向下坐，脊柱中立位（不要圆背或过度弓背）。核心全程收紧，最低点髋关节低于膝关节（或能力范围内），上升时髋膝同步伸展，脚跟不离地。'},
          {id:'kp44',text:'硬拉技术关键点：双脚与髋同宽，杠铃在脚中上方紧贴小腿。握距与肩同宽。预备时臀部略高于膝、肩在杠铃前方、脊柱中立、胸挺、核心收紧。拉起时髋膝同步伸展，保持杠铃贴近身体。锁定阶段避免过度后倾腰椎。下放时有控制，回放路径同拉起。'},
          {id:'kp45',text:'卧推技术关键点：仰卧于平板凳上，眼位于杠铃下方。握距略宽于肩。五触点：后脑、双肩胛、双臀、双足稳定接触。下放时控制节奏，杠铃轨迹略向下方倾斜至下胸部。肘与躯干夹角约45-75°（不过度外展以防肩关节撞击）。推起时保持臀部接触凳子。'},
          {id:'kp46',text:'Valsalva手法：深吸气后关闭声门，收缩腹部和肋间肌以增加胸腔内压和腹内压，为脊柱提供额外稳定性。适用于大重量结构动作（如1RM试举）。禁用于高血压、心血管疾病、青光眼患者。不应在每组每次重复中长期使用，可能导致血压剧降后的反射性晕厥。'}
        ]
      }
    ]
  },
  {
    id: 'd4', title: '领域四：安全、紧急程序与职业责任',
    topics: [
      {
        id: 't4-1', title: '运动损伤预防与处理',
        points: [
          {id:'kp47',text:'RICE原则（旧版急性损伤处理）：Rest(休息)→Ice(冰敷20分钟/次,间隔2小时)→Compression(加压包扎)→Elevation(抬高患肢高于心脏)。适用于肌肉拉伤、韧带扭伤等急性期（伤后24-72小时）。'},
          {id:'kp48',text:'PRICE/POLICE原则（更新版）：在RICE基础上加入Protection（保护）或将Rest改为Optimal Loading（最佳负荷），强调早期在无痛范围内进行适量活动以促进愈合（而非完全固定）。冰敷仍有效但更多用于疼痛管理而非必选项。'},
          {id:'kp49',text:'常见运动损伤识别：(1)肌肉拉伤(Strain)=肌肉或肌腱过度牵拉→局部疼痛、肿胀、肌力下降；(2)韧带扭伤(Sprain)=韧带过度拉伸或撕裂→关节不稳、肿胀、淤青；(3)肌腱炎=肌腱过度使用→疼痛随活动增加缓解、晨僵；(4)应力性骨折=骨骼累积负荷超承受力→局部骨痛、压痛、随活动加重。'},
          {id:'kp50',text:'运动损伤的预防策略：(1)充分热身（5-10分钟轻度有氧+动态拉伸+动作特定准备）；(2)渐进增加训练量和强度（每周≤10%增量规则）；(3)适当装备（适合的鞋、护具、训练器械维护）；(4)充足恢复（睡眠7-9小时、训练间隔、交叉训练）；(5)技术优先于重量。'},
          {id:'kp51',text:'AED（自动体外除颤器）使用：(1)确认无反应、无呼吸或仅喘息；(2)呼叫急救(120/911)并请人取AED；(3)立即开始CPR（按压深度5-6cm、速率100-120次/分）；(4)AED到达后立即开机，按语音提示操作——撕开电极片→贴于胸部（右上胸+左侧肋骨）→确保无人接触患者→按"电击"按钮（若建议）。AED会分析心律，仅在检测到可电击心律时放电。'},
          {id:'kp52',text:'运动前筛查和风险分层：低风险=无症状+≤1个CVD风险因素→可开始中等强度运动，无需医学检查。中等风险=无症状+≥2个CVD风险因素→中等强度运动可开始，高强度需医学检查。高风险=有已知CVD、肺部或代谢疾病症状→任何强度运动均需先获得医生许可。'}
        ]
      },
      {
        id: 't4-2', title: '职业伦理与客户管理',
        points: [
          {id:'kp53',text:'私教职业伦理核心：(1)客户利益优先——设计方案以客户目标为中心，非自我偏好；(2)能力范围——私教并非医生、营养师或物理治疗师，遇到超出专业范围的健康问题需转介至对应专业；(3)保密性——保护客户个人信息和健康数据，未经书面同意不向第三方透露；(4)持续教育——保持认证有效，追循最新运动科学。'},
          {id:'kp54',text:'客户隐私保护：所有健康筛查表格（PAR-Q、健康史、评估记录、训练日志）必须妥善保管，仅用于训练设计。通过书面同意书告知客户信息使用范围。电子记录需密码保护或加密。敏感信息（如体重、体脂率）在测量和讨论时需注意环境隐私。'},
          {id:'kp55',text:'转介流程：当遇到以下情况须果断转介——(1)未明确诊断的疼痛/损伤（→物理治疗师或医生）；(2)疑似心血管或代谢疾病症状（→医生）；(3)复杂营养需求如饮食失调（→注册营养师RDN）；(4)精神健康问题如运动成瘾或身体意象障碍（→心理咨询师）。转介不是推卸责任，而是保障客户安全的基本职业操守。'},
          {id:'kp56',text:'知情同意书(Informed Consent)：开始训练前必须签署，内容包括——训练潜在风险和益处、评估流程、应急程序、隐私条款、收费与取消政策、转介协议。客户在理解全部内容后自愿签字，私教也需签名并注明日期。'},
          {id:'kp57',text:'NSCA职业道德准则强调"以科学为基础的实践"(Evidence-Based Practice)：所有训练方法应有循证依据支持，不推广未经科学验证的"流行训练法"或未经证实的补剂。私教应能区分轶事经验和同行评议研究，并在与客户沟通时坦诚回答"我目前不确定，让我为你查证"而非凭空猜测。'}
        ]
      }
    ]
  }
];

/* ===== DATA: Flashcards ===== */
const FLASHCARD_DATA = [
  {term:'DOMS',def:'延迟性肌肉酸痛(Delayed Onset Muscle Soreness)：运动后12-72小时出现的肌肉酸痛，通常由离心负荷过大或不习惯的训练引起，并非乳酸堆积所致。'},{term:'VO₂max',def:'最大摄氧量：人体在高强度运动中每公斤体重每分钟能利用的最大氧气量(ml/kg/min)。是评估心肺耐力的金标准，反映有氧代谢能力的上限。'},{term:'乳酸阈',def:'运动中血乳酸开始系统性积累的强度临界点。反映乳酸产生与清除的平衡被打破，是预测耐力表现的重要指标。提高乳酸阈可延迟疲劳。'},{term:'解剖适应期',def:'短期训练初期阶段（约4-8周），以神经适应性为主——动作模式改善、运动单位同步性提高、拮抗肌共收缩减少——而非肌纤维显著增粗。'},{term:'向心收缩',def:'肌肉收缩时长度缩短，肌丝向肌小节中心滑动。例如，肱二头肌弯举的举起阶段使前臂靠近肩膀。'},{term:'离心收缩',def:'肌肉在收缩中主动拉长（抵抗外力），横桥在脱离过程中仍产生力。例如，深蹲下降阶段的股四头肌、硬拉下放阶段的腘绳肌。DOMS的主要诱因。'},{term:'等长收缩',def:'肌肉产生张力但关节角度不变、肌肉长度不变。例如，平板支撑姿势、握力维持。常用于康复早期和核心稳定训练。'},{term:'RM',def:'Repetition Maximum（最大重复次数）：在保持正确技术下，某一重量能完成的最高重复次数。1RM即只能完成1次的最大重量。'},{term:'Valsalva手法',def:'深吸气后闭住声门、收紧腹部，以增加胸腹腔内压力的技巧。可用于大重量举起的脊柱稳定，但禁用于高血压及心脏病患者。'},{term:'Borg RPE量表',def:'自觉用力强度评分(Borg Rating of Perceived Exertion)：范围6-20分或0-10分。6-20分乘以10可近似对应心率（如RPE 12≈120 bpm）。方便客户自感知训练强度。'},{term:'代谢当量(MET)',def:'安静的坐位状态下每公斤体重的能量消耗，1 MET≈3.5ml/kg/min耗氧量。3 METs≈慢走，6 METs≈中等速度骑行，10+ METs≈跑步。'},{term:'柔韧性',def:'单个关节或关节群在其活动范围(ROM)内移动的能力。影响因素包括关节囊、韧带、肌腱硬度、肌肉长度、神经系统张力感知。'},{term:'稳定性',def:'关节在施加负荷的情况下维持或控制其位置和运动轨迹的能力。需要肌肉协同、神经肌肉控制及韧带被动支撑三者协调。'},{term:'SAID原则',def:'Specific Adaptation to Imposed Demands：施加的需求决定身体产生的适应性变化。训练的特性决定了适应的方向和程度。'},{term:'过度训练',def:'持续高强度训练+恢复不足导致的慢性表现下降，伴随生理心理症状（持续疲劳、失眠、易怒、免疫力下降）。区别于功能性过度努力(短期)→恢复后可超量恢复。'},{term:'身体成分',def:'人体内脂肪组织和去脂体重（骨骼、肌肉、水分、器官）的相对比例。评估方法包括：皮褶测量、DEXA、BIA、水下称重等。BMI不能直接反映身体成分。'},{term:'生物力学',def:'运用力学原理分析人体运动。关键概念：杠杆系统（支点-力量臂-阻力臂）、关节力臂、关节角速度。优化动作技术以最大化力量效率和最小化损伤风险。'},{term:'杠杆系统',def:'一级杠杆：支点在力与阻力之间（如颈椎的寰枕关节）。二级杠杆：阻力在支点与力之间（如足踝跖屈）。三级杠杆：力在支点与阻力之间（如肘关节屈曲），人体大多数关节。'},{term:'力偶',def:'两股或以上方向不同但合力产生纯旋转的力。典型力偶：前锯肌与斜方肌协同使肩胛骨上旋，保证肩关节完整活动范围和避免撞击。'},{term:'动作补偿',def:'当身体无法以标准模式完成动作时，自动采用替代肌肉或替代动作策略的偏差模式。例如，深蹲时脚跟抬起→腓肠肌/比目鱼肌过紧代偿。私教需识别并纠正补偿模式。'},{term:'相对强度',def:'以个人当前的最大能力为参考的强度百分比（如%1RM或%HRmax），而非绝对重量或绝对心率值。使用相对强度可给不同基础的客户开出可比较的训练负荷。'},{term:'训练量',def:'总的做功量，通常表示为组数×次数。训练量是训练计划中管理疲劳和适应的重要变量。高训练量增加代谢压力和肌肥大刺激，但同样增加恢复需求。'},{term:'训练频率',def:'每周训练某一肌群或动作模式的次数。一般人群2-3次/周，分拆式训练可增加频率。恢复状态影响最佳频率的选择；同一肌群间隔48-72小时通常合适。'},{term:'容量负荷',def:'组数×次数×重量(kg)计算得出的训练总量指标。用于追踪训练负担、控制周间负荷增幅（建议5-10%）。监控容量负荷可降低过度使用伤的发生概率。'},{term:'RICE原则',def:'Rest(休息)、Ice(冰敷)、Compression(加压)、Elevation(抬高)——急性软组织损伤的传统处理方案，建议在伤后24-72小时内使用。已被更新的PRICE/POLICE原则扩增。'},{term:'本体感觉',def:'身体感知自身关节位置、运动方向和速度的能力，由肌梭（长度变化）、高尔基腱器（张力变化）、关节感受器共同提供反馈。核心训练的关键要素——在不稳定平面训练可挑战本体感觉系统。'},{term:'下交叉综合征',def:'姿势偏差——腰椎前凸过度、骨盆前倾。过紧：髋屈肌群+竖脊肌下段；过弱：腹直肌+腘绳肌+臀大肌。常见于久坐人群或腹肌薄弱者。'},{term:'上交叉综合征',def:'姿势偏差——头部前倾、圆肩、胸椎后凸。过紧：胸大/小肌+上斜方肌+肩胛提肌；过弱：深层颈屈肌+中下斜方肌+菱形肌。常见于长时间电脑工作人群。'},{term:'动态拉伸',def:'通过完整关节活动范围的可控动态运动进行拉伸，如高抬腿、腿摆动、行进弓步。适合运动前准备，可提升组织温度、激活神经肌肉系统。'},{term:'静态拉伸',def:'将肌肉拉伸至末端位置并保持15-60秒的方法。运动后执行可改善柔韧性；运动前过度静态拉伸可能暂时降低力量输出和爆发力表现。'},{term:'PNF拉伸',def:'本体感觉神经肌肉促进：交替进行被拉伸肌群的收缩(6秒)与放松后在更大范围内拉伸(10-30秒)的方法。需要同伴辅助，是目前公认效率最高的柔韧性训练方法之一。'},{term:'等长收缩',def:'肌肉产生力但长度不变的收缩类型。例如平板支撑中的腹直肌。常用于稳定性训练和康复初期。'},{term:'心输出量',def:'Cardiac Output = 每搏输出量(SV) × 心率(HR)。成年男性静息值~5L/min，最大运动时可达20-40L/min。耐力训练可增加每搏输出量以降低静息心率。'},{term:'每搏输出量',def:'Stroke Volume：左心室每次收缩射出的血液量(ml/次)。静息约70ml/次，最大运动时可达100-200ml/次。耐力训练后心室腔增大、心肌收缩力增强→每搏输出量增加。'},{term:'乳酸',def:'糖酵解的副产物，现已认识到乳酸是重要的中间代谢物和能量来源（通过乳酸穿梭机制在肌肉、心脏、肝脏间转运），而非传统认为的"导致肌肉酸痛的废物"。'},{term:'糖尿病适应',def:'长期有氧训练后肌肉毛细血管密度增加、线粒体数量和体积增加、氧化酶活性上调，导致从脂肪获取能量的能力增强、糖原节省效应——这是耐力表现提升的生理基础。'},{term:'肌肥大',def:'肌肉横截面积增加的生理过程。机制：(1)机械张力（大负荷募集更多肌纤维）→(2)代谢压力（细胞肿胀、代谢产物积累）→(3)肌肉微创伤→蛋白质合成上调→超量恢复→横截面积增加。'},{term:'金字塔训练',def:'训练课中逐步递增或递减重量/次数的策略。递增金字塔（重量↑次数↓）可渐进热身并激发神经系统；递减金字塔（重量↓次数↑）用于增加代谢压力和训练量。'},{term:'拮抗肌',def:'执行与主动肌相反关节动作的肌群。例如弯举中：肱二头肌(主动肌)→肱三头肌(拮抗肌)。拮抗肌在主动肌收缩时会放松（交互抑制），训练中两者需平衡发展以避免肌肉失衡。'},{term:'核心',def:'人体中心区域的肌肉，包括骨盆、腹部、下背、髋部共29块肌肉。功能：稳定脊柱→传递上下肢力量→保护内脏。核心训练三水平：稳定→力量→爆发。'}
];

/* ===== DATA: Quiz Questions ===== */
const QUIZ_DATA = [
  {id:'q1',question:'以下哪项是心脏的起搏点？',options:['A. 房室结','B. 希氏束','C. 窦房结','D. 浦肯野纤维'],correct:2,explanation:'窦房结(SA Node)位于右心房上部，能自发性产生电脉冲，是心脏的自然起搏点，正常发放频率约60-100次/分钟。房室结充当传导延迟站，希氏束和浦肯野纤维负责将电信号传导至心室肌。'},{id:'q2',question:'在OPT模型的力量耐力阶段，重复次数范围通常是？',options:['A. 1-5','B. 6-12','C. 8-15','D. 15-25'],correct:2,explanation:'OPT力量耐力阶段使用8-15次（力量组8-12次+稳定性组12-20次），中等负荷(70-80% 1RM)，采用超级组设计。目的是在维持力量的同时提高工作容量和抗疲劳能力。'},{id:'q3',question:'进行俯卧撑时，主要训练的肌肉群是？',options:['A. 股四头肌','B. 胸大肌','C. 背阔肌','D. 臀大肌'],correct:1,explanation:'俯卧撑主要训练胸大肌，同时涉及前三角肌和肱三头肌作为协同肌。核心肌群保持等长收缩以维持身体笔直。手的放置宽度影响胸大肌和肱三头肌的参与比例。'},{id:'q4',question:'以下哪种拉伸方式是借助外力并保持一段时间？',options:['A. 动态拉伸','B. 静态拉伸','C. 主动分离式拉伸','D. PNF拉伸'],correct:1,explanation:'静态拉伸是指将肌肉拉伸至末端位置并保持15-60秒不动，可借助重力、同伴或器械辅助。其他选项：动态拉伸=可控运动通过ROM；主动分离式=主动肌收缩带动拉伸；PNF=收缩-放松交替。'},{id:'q5',question:'Valsalva手法会产生以下哪种现象？',options:['A. 血压下降','B. 胸腔内压升高','C. 心率下降','D. 静脉回流增加'],correct:1,explanation:'Valsalva手法通过声门关闭+腹肌收缩→胸腔内压和腹内压飙高，为脊柱提供额外稳定性。但同时可能限制静脉回流、导致心输出量短暂下降和血压波动。高血压或CVD患者应避免。'},{id:'q6',question:'体重指数(BMI)属于哪种评估范畴？',options:['A. 身体成分','B. 心血管功能','C. 柔韧性','D. 肌肉耐力'],correct:0,explanation:'BMI是通过身高和体重估算体型的指标，用于初步筛查超重和肥胖，因此属于身体成分评估范畴。但BMI不区分脂肪重与去脂体重，运动员可能被误判为"超重"。'},{id:'q7',question:'静态评估中从侧面观察客户的铅垂线，正常排列下铅垂线应穿过以下哪些点？',options:['A. 耳、肩峰、大转子、膝关节前方、外踝前方','B. 耳、肩峰中段、大转子、膝关节中段、外踝前方稍前','C. 耳、锁骨中点、髂前上棘、膝关节后方、内踝','D. 鼻尖、胸骨、肚脐、膝关节中点、足弓'],correct:1,explanation:'标准的侧面观铅垂线排列：外耳道→肩峰中点→大转子中点→膝关节中线前方→外踝前方稍前。偏离这条线可判断前倾/后倾姿态。'},{id:'q8',question:'磷酸原系统（ATP-PC）提供最大功率输出的持续时间大约为？',options:['A. 1-3秒','B. 6-10秒','C. 30-60秒','D. 2-3分钟'],correct:1,explanation:'磷酸原系统中的ATP储备只能持续约2-3秒，接着磷酸肌酸(PCr)分解补充ATP，合计提供约6-10秒的最大功率输出。适合短跑、跳跃、投掷等爆发性动作。'},{id:'q9',question:'以下哪项不属于核心训练三个水平的划分？',options:['A. 核心稳定','B. 核心力量','C. 核心耐力','D. 核心爆发'],correct:2,explanation:'NSCA/OPT将核心训练划分为三个水平：稳定（静态保持、脊柱中立位控制）→力量（在稳定基础上对抗动态阻力，如药球卷腹）→爆发（快速传递能量，如药球过顶投掷）。无独立的"核心耐力"分类。'},{id:'q10',question:'客户深蹲时出现脚跟抬起、膝盖内扣(Knee Valgus)的趋势，最可能的常见原因是？',options:['A. 股四头肌过强','B. 臀中肌薄弱和踝背屈受限','C. 胸椎活动度不足','D. 腹肌过度紧张'],correct:1,explanation:'膝盖内扣(knee valgus)通常指向臀中肌薄弱（无法稳定髋外展/外旋）和/或踝关节背屈受限（迫使身体前倾用以补偿→膝盖代偿性内扣）。纠正策略：加强臀中肌（侧卧抬腿、怪兽走）+改善踝活动度（小腿拉伸、弹力带踝活动度训练）。'},{id:'q11',question:'心肺耐力训练中，中等强度对应的%HRR或%VO₂max范围通常是？',options:['A. 20-30%','B. 40-60%','C. 60-80%','D. 85-95%'],correct:1,explanation:'ACSM/NSCA指南定义中等强度心肺运动为40-60% HRR(心率储备)或VO₂max。该强度下能进行交谈但不轻松（talk test）。60-89%HRR为剧烈(vigorous)强度。'},{id:'q12',question:'以下关于"离心收缩"的描述哪项是正确的？',options:['A. 肌纤维缩短，关节角度减小','B. 肌纤维在产生张力的同时被拉长','C. 肌纤维不产生张力，保持固定长度','D. 肌纤维长度不变，关节稳定'],correct:1,explanation:'离心收缩=肌肉产生力但整体被拉长（抵抗外力的同时变长）。典型例子：深蹲下降阶段（股四头肌离心收缩）、杠铃弯举下放阶段。离心收缩消耗较少能量却产生较大力，也是DOMS的主要原因。'},{id:'q13',question:'NSCA建议在开始高强度训练前，低或中等风险客户需要哪种形式的运动前筛查？',options:['A. 仅口头确认健康状况','B. 心电图(ECG)','C. PAR-Q或同等健康筛查问卷','D. 医生签字许可'],correct:2,explanation:'PAR-Q(体力活动准备问卷)是运动前分层评估的第一步筛查工具。仅当PAR-Q回答"是"或有已知CVD症状（高风险）时，才需要转介给医生获得许可。低和中等风险客户可通过PAR-Q筛查后直接开始适当强度的训练。'},{id:'q14',question:'Borg RPE 6-20量表中，评分15大约对应什么主观感受和近似心率？',options:['A. 非常轻松，~60 bpm','B. 有点费力(Hard)，~150 bpm','C. 轻松，~90 bpm','D. 极其费力，~200 bpm'],correct:1,explanation:'Borg RPE量表6-20范围中，分数×10≈心率。RPE 15≈150 bpm，对应"Hard/费力"水平——能说话但需要主动配合呼吸。这是中等偏高强度的训练区间，适合大多数客户的训练阶段。'},{id:'q15',question:'人体运动平面中，冠状面将身体分为？',options:['A. 左右两部分','B. 上下两部分','C. 前后两部分','D. 内外两部分'],correct:2,explanation:'冠状面(Frontal/Coronal Plane)垂直分割身体为前(anterior)和后(posterior)两部分。冠状面上的运动包括外展(侧平举)、内收、侧屈。哑铃侧平举是经典的冠状面动作。'},{id:'q16',question:'1RM预测公式 Epley 的计算方式是？',options:['A. 1RM = weight × reps / 30','B. 1RM = weight × (1 - reps/30)','C. 1RM = weight × (1 + reps/30)','D. 1RM = weight / (1 + reps/30)'],correct:2,explanation:'Epley公式：1RM = weight × (1 + reps/30)。例如，80kg完成8次→估算1RM=80×(1+8/30)=80×1.267≈101.3kg。该公式在1-10次范围内较为准确，超过10次精度下降。'},{id:'q17',question:'运动损伤的PRICE原则相比RICE增加了哪个重要元素？',options:['A. Relax（放松）','B. Protection（保护）','C. Preparation（准备）','D. Pressure（压力）'],correct:1,explanation:'PRICE在RICE(Rest,Ice,Compression,Elevation)基础上增加Protection(保护)——包括使用拐杖、支架或绑带限制进一步损伤，为愈合创造环境。更新的POLICE将Rest改为Optimal Loading(最佳负荷)，鼓励无痛范围早期活动。'},{id:'q18',question:'以下哪个关节属于"铰链关节"？',options:['A. 肩关节','B. 髋关节','C. 肱尺关节（肘关节的主体）','D. 腕关节'],correct:2,explanation:'肱尺关节是肘关节的主体，属铰链关节（单轴），只能在矢状面做屈伸运动。肩和髋属于球窝关节（多轴），腕关节是椭圆关节。'},{id:'q19',question:'NSCA的私教执业范围不包括以下哪项？',options:['A. 设计安全的抗阻训练计划','B. 为客户提供营养餐单和疾病诊断','C. 进行健康筛查和基本体能评估','D. 教授安全的动作技术'],correct:1,explanation:'私教的执业范围不包括向客户提供特定营养餐单（应转介注册营养师RDN）或进行医学诊断（应由医生执行）。私教的角色是教练/指导，提供循证训练计划、技术指导和健康筛查。'},{id:'q20',question:'以下哪项不是"渐进超负荷"的正确实施方式？',options:['A. 每次训练都冲击新的1RM','B. 增加重复次数','C. 增加训练组数','D. 缩短组间休息时间'],correct:0,explanation:'渐进超负荷是循序渐进的，不需要每次都冲击1RM。安全的超负荷方法包括：增加重量(2-5%)、增加次数/组数、增加训练频率、缩短休息间隔、增加ROM等。每次冲击极限反而大幅增加损伤风险。'},{id:'q21',question:'DOMS通常在运动后什么时间达到峰值？',options:['A. 立即','B. 运动后6-8小时','C. 运动后24-72小时','D. 运动后一周'],correct:2,explanation:'延迟性肌肉酸痛(DOMS)通常在运动后24-48小时达到峰值，可持续72小时以上。主要由离心-偏重或不习惯的负荷引起，伴有肌小节Z线流变和低度炎症。轻度活动（有氧、轻拉伸）可暂时缓解症状。'},{id:'q22',question:'如果客户的目标是肌肥大，组间休息的最佳时长是？',options:['A. 30秒以内','B. 45-90秒','C. 3-5分钟','D. 10分钟以上'],correct:1,explanation:'肌肥大训练推荐组间休息60-90秒。较短的休息增加代谢压力（肌肥大关键驱动因素之一），同时仍允许足够恢复以维持重复次数和负荷。最大力量训练则需要更长的3-5分钟以确保神经系统充分恢复。'},{id:'q23',question:'以下关于"核心稳定"训练的正确描述是？',options:['A. 使用大重量杠铃训练核心','B. 在不稳定平面上执行爆发性动作','C. 脊柱稳定在中立位下对抗轻微挑战','D. 核心爆发力训练'],correct:2,explanation:'核心稳定训练强调保持脊柱中立位和姿势控制，通常在不稳定平面（平衡盘）或减少支撑底面积（单腿平板）执行低负荷、长时间保持。核心力量阶段才引入对抗阻力的动态运动，核心爆发才引入高速投掷/旋转动作。'},{id:'q24',question:'理想情况下，应在运动前多久进行主要的一餐？',options:['A. 运动前30分钟','B. 运动前1-4小时','C. 运动前8小时','D. 空腹运动'],correct:1,explanation:'运动前1-4小时进食（含碳水1-4g/kg、蛋白质0.25-0.4g/kg）可确保运动时血糖和糖原供应充足，同时避免胃部不适。距离运动越近的进食（<1小时）应越小份、液体为主、易消化。'},{id:'q25',question:'心输出量(CO)的计算公式是什么？',options:['A. CO = 心率 × 血压','B. CO = 每搏输出量 × 心率','C. CO = 心率 / 每搏输出量','D. CO = 血压 × 每搏输出量'],correct:1,explanation:'心输出量(Cardiac Output)=每搏输出量(Stroke Volume)×心率(Heart Rate)。成年男性静息CO约5L/min，最大运动时可通过增加SV(2-3倍)和HR(3倍)将CO提升至20-40L/min。'},{id:'q26',question:'IIx型肌纤维（快缩酵解型）的主要特征是什么？',options:['A. 收缩速度慢、高耐力、高线粒体密度','B. 收缩速度快、力量高、低线粒体密度','C. 收缩速度中等、兼具耐力和力量','D. 同时生产ATP和乳酸'],correct:1,explanation:'IIx型纤维（人类类似于IIb型，但表达为IIx）特征：快缩+高力量+低线粒体密度+依赖糖酵解供能。适合短跑、跳跃、举重等爆发操作而非耐力活动。IIa型（快缩氧化酵解型）介于I型和IIx型之间。'},{id:'q27',question:'训练肌群的最佳训练频率（每周每个肌群）通常是多少？',options:['A. 每周1次','B. 每周2-3次','C. 每周5-6次','D. 每天'],correct:1,explanation:'大多数研究支持每周每肌群2-3次训练为力量和肌肥大增益的最佳频率。同一肌群需要48-72小时恢复。每周1次可维持力量，但进步较慢；每天训练同一肌群则恢复不足、增加过度训练风险。'},{id:'q28',question:'以下哪项不是心肺耐力的主要评估指标？',options:['A. VO₂max','B. 1RM卧推重量','C. 乳酸阈','D. 运动经济性'],correct:1,explanation:'1RM卧推重量是肌肉力量的指标，非心肺耐力。心肺耐力评估的核心指标包括VO₂max（最大摄氧量）、乳酸阈、运动经济性（在给定速度下的摄氧量）。它们三者共同预测耐力表现。'},{id:'q29',question:'深蹲时教练喊"膝盖朝向脚尖方向"是为了防止什么问题？',options:['A. 足底筋膜炎','B. 膝关节内扣(Knee Valgus)','C. 肩袖损伤','D. 下背痛'],correct:1,explanation:'膝盖朝向脚尖对齐髋-膝-踝发力链可预防膝盖内扣(Knee Valgus)，后者可能引起前交叉韧带(ACL)应力增加和髌股关节疼痛。臀中肌的激活和踝背屈活动度是预防膝内扣的关键。'},{id:'q30',question:'使用AED时，电极片应贴在哪个位置？',options:['A. 左右前臂','B. 右上胸和左侧肋骨','C. 左右大腿','D. 前后胸（左前胸+左后背）'],correct:1,explanation:'AED标准电极位置：一片贴在胸骨右侧上方（右上胸/锁骨下方），另一片贴在左乳头外侧（左侧肋骨/腋中线）。目的使电击路径通过心室肌以消除颤动。按AED语音提示操作。'},{id:'q31',question:'代谢当量(MET)的定义基于哪种状态下的耗氧量？',options:['A. 最大运动状态','B. 安静坐位状态','C. 睡眠状态','D. 站立状态'],correct:1,explanation:'1 MET定义为安静坐位状态下的耗氧量≈3.5 ml/kg/min。这是评估和比较不同活动强度的基础单位——3 METs≈慢走（轻度），6 METs≈中等骑行，10+ METs≈跑步（剧烈）。'},{id:'q32',question:'将客户信息分享给理疗师前，私教应确保什么？',options:['A. 口头告知理疗师即可','B. 客户签署书面同意书','C. 自动默认私教可分享信息','D. 不需要任何同意，这是专业判断'],correct:1,explanation:'根据职业伦理和隐私法规，向任何第三方（包括理疗师、医生）透露客户健康信息前，必须获得客户的书面知情同意。保护客户隐私是NSCA职业道德的核心条款。'},{id:'q33',question:'腹直肌的主要功能是什么？',options:['A. 脊柱旋转','B. 脊柱侧屈','C. 脊柱屈曲和维持腹内压','D. 髋关节屈曲'],correct:2,explanation:'腹直肌位于腹部前壁，主要功能是脊柱屈曲（如仰卧起坐中的卷腹阶段）和增加腹内压（与腹横肌、腹斜肌协同）。它不是脊柱旋转的主要肌肉（旋转由腹内/外斜肌完成）。'},{id:'q34',question:'以下关于热身正确的描述是？',options:['A. 只需做静态拉伸','B. 热身=5-10分钟轻度有氧+动态拉伸+特定动作准备','C. 完全不需要热身，直接开始训练','D. 只需做动态拉伸，不需有氧'],correct:1,explanation:'完整热身包括：(1)5-10分钟轻度有氧活动→升高组织温度；(2)动态拉伸→提高关节活动范围和神经肌肉激活；(3)特定动作准备→用轻重量预演当日的训练动作。温度升高使肌肉和结缔组织的粘弹性降低，更不易受伤。'},{id:'q35',question:'SAID原则中的"S"代表什么？',options:['A. Speed（速度）','B. Strength（力量）','C. Specific（特定的）','D. Systematic（系统的）'],correct:2,explanation:'SAID=Specific Adaptation to Imposed Demands（对强加需求的特定适应）。核心思想：身体会根据施加的特定要求类型产生适应性变化——你如何训练，身体就如何适应。'},{id:'q36',question:'对于初级客户的第一周训练，最安全的做法是？',options:['A. 直接使用85% 1RM进行训练','B. 从OPT稳定性阶段（低负荷、高重复次数）开始','C. 做极限1RM测试','D. 每天进行2小时高强度训练'],correct:1,explanation:'初学者应从OPT稳定性耐力阶段开始：低负荷(50-70%估计值)、高次数(12-20)、学习动作模式并建立神经肌肉控制。在动作模式稳定前不进行最大力量测试或训练。'},{id:'q37',question:'哪项不是心血管疾病的风险因素？',options:['A. 吸烟','B. 高血压','C. 规律运动','D. 糖尿病'],correct:2,explanation:'规律运动是心血管疾病的保护因素，降低CVD风险，而非风险因素。公认的CVD风险因素包括：吸烟、高血压、血脂异常（高LDL、低HDL）、糖尿病、肥胖、久坐不动、家族早发CVD史。'},{id:'q38',question:'ACE抑制剂等降压药的常见作用机制是？',options:['A. 增加心率','B. 扩张外周围血管降低血管阻力','C. 增加每搏输出量','D. 增加血容量'],correct:1,explanation:'ACE抑制剂和ARB类药物通过抑制血管紧张素转化酶或阻断血管紧张素Ⅱ受体，导致外周血管舒张→降低外周血管阻力→降低血压。运动可能叠加降压效果，需监测客户在训练中的血压变化和症状。'},{id:'q39',question:'按肌肉大小和使用类型将抗阻训练动作分类，以下哪项归类正确？',options:['A. 杠铃深蹲=辅助动作','B. 二头弯举=基础力量动作','C. 传统硬拉=基础力量动作','D. 平板支撑=爆发性动作'],correct:2,explanation:'传统硬拉是基础力量动作（多关节、大肌群、高神经肌肉募集要求）。杠铃深蹲也是基础力量动作，二头弯举是辅助/隔离动作。平板支撑属于核心稳定动作。'},{id:'q40',question:'训练日志的主要价值不包括以下哪一项？',options:['A. 追踪渐进超负荷的进展','B. 发现过度训练的早期征兆','C. 诊断特定的心脏疾病','D. 记录客户反馈和动作补偿改善'],correct:2,explanation:'训练日志是教练工具，非医学诊断工具。它能追踪负荷进展、识别过度训练信号、量化客户改善，但不能替代医学设备诊断心脏或其他疾病。遇到健康问题应转介医疗机构。'}
];

const EXERCISE_DATA = [
  {id:'e1',name:'杠铃卧推',muscle:'胸部',bgColor:'#4a90d9',tips:['仰卧于平板凳上，眼睛位于杠铃正下方，握距略宽于肩','下放时控制节奏，杠铃轨迹略向下方倾斜至下胸部位置','推起时呼气，保持臀部接触凳子，双脚平稳踩地','肘与躯干夹角保持45-75°，避免过度外展引发肩撞击']},{id:'e2',name:'上斜哑铃卧推',muscle:'胸部',bgColor:'#5da0e8',tips:['仰卧于上斜凳（约30-45°），双手各持哑铃置于胸前两侧','向上推起哑铃至手臂伸直，哑铃在胸口上方靠拢','下放时吸气、控制节奏，保持前臂与地面垂直','上斜位更多刺激胸大肌上部（锁骨部）']},{id:'e3',name:'自重深蹲',muscle:'腿部',bgColor:'#e8743d',tips:['双脚与肩同宽或略宽，脚尖略向外约5-15°','髋向后向下坐，保持脊柱中立位（不要圆背或过度弓背）','下蹲至大腿与地面平行或更低（能力范围内），膝盖与脚尖方向一致','上升时呼气，髋膝同步伸展，脚跟不离地']},{id:'e4',name:'传统硬拉',muscle:'背部',bgColor:'#7b8c9e',tips:['双脚与髋同宽，杠铃在脚中上方紧贴小腿，握距与肩同宽','预备时胸挺、核心收紧、脊柱中立、臀部略高于膝','拉起时髋膝同步伸展，保持杠铃贴近身体，锁定阶段避免腰椎过度后倾','下放时有控制，回放路径同拉起，不要自由落体']},{id:'e5',name:'哑铃肩推',muscle:'肩部',bgColor:'#c49b3f',tips:['坐姿（靠背80-90°），双手各持哑铃置于肩上，掌心朝前','向上推起哑铃至手臂伸直，哑铃在头顶上方靠近但不碰撞','下放时吸气并控制节奏至哑铃约与耳齐平','全程核心收紧，避免腰椎过度伸展（别往后弯腰借力）']},{id:'e6',name:'平板支撑',muscle:'核心',bgColor:'#4caf96',tips:['前臂支撑于地面，肘位于肩正下方，双腿伸直、脚掌着地','骨盆中立位，腹肌和臀肌收紧，身体呈一条直线','保持正常呼吸，不需要憋气——用腹式呼吸维持核心稳定','初学者从15-30秒开始，逐步增加保持时间至60秒以上']},{id:'e7',name:'哑铃弯举',muscle:'手臂',bgColor:'#9b59b6',tips:['站姿或坐姿，双手各持哑铃，掌心朝前，手臂自然下垂','大臂保持固定于躯干两侧，弯曲肘关节抬起哑铃','弯举时呼气，顶峰收缩约1秒，缓慢下放（离心控制：2-3秒）','躯干保持稳定，不要前后晃动借力']},{id:'e8',name:'三头绳索下压',muscle:'手臂',bgColor:'#8e44ad',tips:['面对龙门架，双手正握绳索，即中握或窄握','上臂保持固定在躯干两侧，伸直肘关节向下压绳','全程发力点在三头肌，手臂下压至完全伸展，顶峰收缩1秒','缓慢控制回放（离心阶段），手臂回到约90°屈肘位置']},{id:'e9',name:'壶铃摆举',muscle:'腿部',bgColor:'#d35400',tips:['双脚略宽于肩，双手同时持壶铃，壶铃置于身前地面稍前方','髋铰链带动壶铃向后摆动（不是"深蹲"），背部保持中立','髋部爆发性前推，臀大肌全力收缩，带动壶铃前摆至胸部高度（臂伸直）','壶铃下摆时有控制吸能，利用下摆动能为下一轮蓄力——这是一项髋主导的有氧+爆发混合动作']},{id:'e10',name:'臀桥',muscle:'腿部',bgColor:'#e67e22',tips:['仰卧，双膝屈曲约90°，脚掌平放在地，手臂置于身体两侧','收紧臀大肌将臀部向上推起，形成肩-髋-膝直线','顶峰时全力挤压臀部，保持2-3秒','缓慢下放但臀部不完全着地，保持臀肌张力']},{id:'e11',name:'弓步蹲',muscle:'腿部',bgColor:'#f39c12',tips:['站立，双脚分开约与髋同宽，双手叉腰或持哑铃','向前跨出一大步，前膝与踝对齐，后膝接近地面但不触地','前脚脚跟发力推回起始位置，始终保持躯干直立、核心收紧','交替腿进行，跨步幅度越大对臀大肌刺激越大，幅度越小对股四头肌刺激越大']},{id:'e12',name:'坐姿划船',muscle:'背部',bgColor:'#607d8b',tips:['坐姿在划船机或龙门架前，选择V型手柄，双脚踏稳踏板','腰背保持中立位，肩胛骨后收将手柄拉向下腹或胸口','拉回时呼气，顶峰时肩胛完全夹紧并收缩1秒','伸展时吸气有控制，感受背阔肌和中斜方肌充分拉长，不要完全放松肩胛']},{id:'e13',name:'哑铃侧平举',muscle:'肩部',bgColor:'#c49b3f',tips:['站立或坐姿，双手持轻哑铃置于身体两侧，肘微屈','外展手臂至侧方，保持肘略高于腕（"倒水"姿势），举起至约肩高','缓慢下放时有控制（离心），避免使用惯性摆动','肩胛骨下沉稳定，切勿耸肩借力，全程感受中三角肌发力']},{id:'e14',name:'俄罗斯转体',muscle:'核心',bgColor:'#2ecc71',tips:['坐于地面，膝盖屈约90°，躯干后倾约45°，手持药球或哑铃','核心收紧，缓慢旋转躯干将球从右侧带到左侧','旋转来自胸椎而非腰椎（保护下背部），保持骨盆相对稳定','可在双脚离地（难度更高）或脚跟触地版本之间选择']
  }
];

/* ===== APP ===== */
const App = {
  currentTab: 'knowledge',
  favorites: new Set(),
  quizState: null,

  init() {
    this.loadFavorites();
    NavModule.init();
    KnowledgeModule.render();
    FlashcardModule.init();
    QuizModule.init();
    ExerciseModule.render('all');
    CalculatorModule.init();
    LogModule.init();
  },

  switchTab(tab) {
    this.currentTab = tab;
    document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
    document.getElementById('module-' + tab).classList.add('active');
    if (tab === 'log') LogModule.render();
    if (tab === 'knowledge') KnowledgeModule.render();
  },

  loadFavorites() {
    try {
      const saved = localStorage.getItem('nsca_favorites');
      if (saved) this.favorites = new Set(JSON.parse(saved));
    } catch(e) { this.favorites = new Set(); }
  },

  saveFavorites() {
    try {
      localStorage.setItem('nsca_favorites', JSON.stringify([...this.favorites]));
    } catch(e) {}
  },

  toggleFavorite(kpId) {
    if (this.favorites.has(kpId)) {
      this.favorites.delete(kpId);
    } else {
      this.favorites.add(kpId);
    }
    this.saveFavorites();
    KnowledgeModule.updateStarIcons();
    FavoritesModule.renderList();
  },

  isFavorited(kpId) {
    return this.favorites.has(kpId);
  }
};

/* ===== KNOWLEDGE ===== */
const KnowledgeModule = {
  render() {
    const container = document.getElementById('knowledge-container');
    let html = '';
    KNOWLEDGE_DATA.forEach((domain, di) => {
      html += `<div class="accordion">
        <button class="accordion-header${di === 0 ? ' open' : ''}" data-domain="${domain.id}">
          <span>${domain.title}</span>
          <span class="arrow">▼</span>
        </button>
        <div class="accordion-body${di === 0 ? ' open' : ''}" data-domain-body="${domain.id}">`;
      domain.topics.forEach(topic => {
        html += `<div class="accordion-content"><div class="sub-accordion">
          <button class="sub-accordion-header" data-topic="${topic.id}">
            <span>${topic.title}（${topic.points.length} 条知识点）</span>
            <span class="arrow">▼</span>
          </button>
          <div class="sub-accordion-body" data-topic-body="${topic.id}">
            <div class="sub-accordion-content">
              <ul class="knowledge-list">`;
        topic.points.forEach(point => {
          const isFav = App.isFavorited(point.id) ? ' favorited' : '';
          const starSymbol = App.isFavorited(point.id) ? '⭐' : '☆';
          html += `<li>
            <span class="bullet"></span>
            <span>${point.text}</span>
            <button class="fav-star${isFav}" data-kp-id="${point.id}" title="收藏">${starSymbol}</button>
          </li>`;
        });
        html += `</ul></div></div></div></div>`;
      });
      html += `</div></div>`;
    });
    container.innerHTML = html;
    this.bindEvents();
  },

  bindEvents() {
    const container = document.getElementById('knowledge-container');
    container.addEventListener('click', (e) => {
      const domainHeader = e.target.closest('.accordion-header');
      if (domainHeader) {
        const domainId = domainHeader.dataset.domain;
        const body = container.querySelector(`[data-domain-body="${domainId}"]`);
        body.classList.toggle('open');
        domainHeader.classList.toggle('open');
        return;
      }

      const topicHeader = e.target.closest('.sub-accordion-header');
      if (topicHeader) {
        const topicId = topicHeader.dataset.topic;
        const body = container.querySelector(`[data-topic-body="${topicId}"]`);
        body.classList.toggle('open');
        topicHeader.classList.toggle('open');
        return;
      }

      const favBtn = e.target.closest('.fav-star');
      if (favBtn) {
        const kpId = favBtn.dataset.kpId;
        App.toggleFavorite(kpId);
      }
    });
  },

  updateStarIcons() {
    document.querySelectorAll('.fav-star').forEach(btn => {
      const kpId = btn.dataset.kpId;
      if (App.isFavorited(kpId)) {
        btn.classList.add('favorited');
        btn.textContent = '⭐';
      } else {
        btn.classList.remove('favorited');
        btn.textContent = '☆';
      }
    });
    document.getElementById('favorites-toggle').textContent = App.favorites.size > 0 ? `⭐${App.favorites.size}` : '⭐';
  }
};

/* ===== FLASHCARD ===== */
const FlashcardModule = {
  cards: [],
  history: [],
  currentIndex: 0,

  init() {
    this.cards = [...FLASHCARD_DATA];
    this.shuffle();
    this.showCard(0);

    document.getElementById('flashcard-scene').addEventListener('click', () => {
      document.getElementById('flashcard-inner').classList.toggle('flipped');
    });

    document.getElementById('flashcard-prev').addEventListener('click', () => this.prevCard());
    document.getElementById('flashcard-next').addEventListener('click', () => this.nextCard());
  },

  shuffle() {
    for (let i = this.cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.cards[i], this.cards[j]] = [this.cards[j], this.cards[i]];
    }
    this.history = [];
    this.currentIndex = 0;
  },

  showCard(index) {
    if (index < 0 || index >= this.cards.length) return;
    this.currentIndex = index;
    const card = this.cards[index];
    document.getElementById('flashcard-term').textContent = card.term;
    document.getElementById('flashcard-def').textContent = card.def;
    document.getElementById('flashcard-inner').classList.remove('flipped');
    document.getElementById('flashcard-counter').textContent = `${index + 1} / ${this.cards.length}`;
  },

  nextCard() {
    this.history.push(this.currentIndex);
    let next;
    do {
      next = Math.floor(Math.random() * this.cards.length);
    } while (next === this.currentIndex && this.cards.length > 1);
    this.showCard(next);
  },

  prevCard() {
    if (this.history.length > 0) {
      const prev = this.history.pop();
      this.showCard(prev);
    }
  }
};

/* ===== QUIZ ===== */
const QuizModule = {
  questions: [],
  currentQ: 0,
  answers: [],
  total: 10,

  init() {
    document.getElementById('quiz-start').addEventListener('click', () => this.start());
  },

  start() {
    const shuffled = [...QUIZ_DATA].sort(() => Math.random() - 0.5);
    this.questions = shuffled.slice(0, this.total);
    this.currentQ = 0;
    this.answers = new Array(this.total).fill(null);
    this.renderQuestion();
  },

  renderQuestion() {
    const container = document.getElementById('quiz-content');
    if (this.currentQ >= this.total) {
      this.showScore();
      return;
    }
    const q = this.questions[this.currentQ];
    let html = `
      <div class="quiz-question">第 ${this.currentQ + 1}/${this.total} 题：${q.question}</div>
      <ul class="quiz-options">`;
    q.options.forEach((opt, i) => {
      html += `<li><button class="quiz-option" data-index="${i}">${opt}</button></li>`;
    });
    html += `</ul>
      <div class="quiz-explanation" id="quiz-explanation"></div>
      <button class="btn-primary quiz-next" id="quiz-next">下一题 ▶</button>`;
    container.innerHTML = html;

    container.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (this.answers[this.currentQ] !== null) return;
        const idx = parseInt(e.target.dataset.index);
        this.answers[this.currentQ] = idx;
        this.showResult(idx, q.correct);
      });
    });

    document.getElementById('quiz-next').addEventListener('click', () => {
      this.currentQ++;
      this.renderQuestion();
    });
  },

  showResult(selected, correct) {
    const buttons = document.querySelectorAll('.quiz-option');
    buttons.forEach((btn, i) => {
      btn.classList.add('disabled');
      if (i === correct) btn.classList.add('correct');
      if (i === selected && selected !== correct) btn.classList.add('incorrect');
    });
    const expl = document.getElementById('quiz-explanation');
    expl.textContent = '💡 ' + this.questions[this.currentQ].explanation;
    expl.classList.add('show');
    const nextBtn = document.getElementById('quiz-next');
    nextBtn.classList.add('show');
    if (this.currentQ >= this.total - 1) nextBtn.textContent = '查看成绩 📊';
  },

  showScore() {
    const container = document.getElementById('quiz-content');
    let correctCount = 0;
    const incorrectList = [];
    this.answers.forEach((ans, i) => {
      if (ans === this.questions[i].correct) correctCount++;
      else incorrectList.push({ q: this.questions[i], userAns: ans });
    });

    let html = `<div class="quiz-score">
      <div class="score-big">${correctCount}/${this.total}</div>
      <p>${correctCount >= 8 ? '🎉 太棒了！' : correctCount >= 6 ? '👍 继续加油！' : '📚 需要多复习哦'}</p>
      <button class="btn-primary" id="quiz-retry" style="margin-top:16px">重新测验</button>
    </div>`;

    if (incorrectList.length > 0) {
      html += `<div class="quiz-review"><h3>📋 错题回顾 (${incorrectList.length} 道)</h3>`;
      incorrectList.forEach(item => {
        html += `<div class="review-item">
          <p><strong>${item.q.question}</strong></p>
          <p>你的答案：${item.q.options[item.userAns] || '未作答'}</p>
          <p>正确答案：${item.q.options[item.q.correct]}</p>
          <p style="color:#1a5276;font-size:0.85rem">💡 ${item.q.explanation}</p>
        </div>`;
      });
      html += `</div>`;
    }

    container.innerHTML = html;
    document.getElementById('quiz-retry').addEventListener('click', () => this.start());
    LogModule.saveQuizResult(correctCount, this.total);
  }
};

/* ===== CALCULATOR ===== */
const CalculatorModule = {
  init() {
    document.querySelectorAll('.calc-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.calc-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.calc-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('calc-' + tab.dataset.calc).classList.add('active');
      });
    });

    document.getElementById('rm-calc').addEventListener('click', () => this.calc1RM());
    document.getElementById('hr-calc').addEventListener('click', () => this.calcHR());
  },

  calc1RM() {
    const errEl = document.getElementById('rm-error');
    const resultEl = document.getElementById('rm-result');
    errEl.classList.remove('show');
    resultEl.classList.remove('show');

    const weight = parseFloat(document.getElementById('rm-weight').value);
    const reps = parseInt(document.getElementById('rm-reps').value);

    if (isNaN(weight) || isNaN(reps) || weight <= 0 || reps <= 0) {
      errEl.textContent = '请输入有效的正数（重量和重复次数）。';
      errEl.classList.add('show');
      return;
    }
    if (reps > 30) {
      errEl.textContent = '重复次数建议不超过30次，Epley公式在低重复次数区间最准确。';
      errEl.classList.add('show');
      return;
    }

    const rm = weight * (1 + reps / 30);
    document.getElementById('rm-value').textContent = rm.toFixed(1) + ' kg';
    resultEl.classList.add('show');
  },

  calcHR() {
    const errEl = document.getElementById('hr-error');
    const resultEl = document.getElementById('hr-result');
    errEl.classList.remove('show');
    resultEl.classList.remove('show');

    const age = parseInt(document.getElementById('hr-age').value);
    const intensity = document.getElementById('hr-intensity').value;

    if (isNaN(age) || age <= 0 || age > 120) {
      errEl.textContent = '请输入有效的年龄（1-120）。';
      errEl.classList.add('show');
      return;
    }
    if (!intensity) {
      errEl.textContent = '请选择强度百分比。';
      errEl.classList.add('show');
      return;
    }

    const maxHR = 220 - age;
    const [low, high] = intensity.split('-').map(Number);
    const lowHR = Math.round(maxHR * low / 100);
    const highHR = Math.round(maxHR * high / 100);
    const zoneLabels = {
      '50-60': { name: '热身/恢复区', color: '#28a745' },
      '60-70': { name: '燃脂/有氧区', color: '#17a2b8' },
      '70-80': { name: '心肺强化区', color: '#ff6b35' },
      '80-90': { name: '高强度训练区', color: '#dc3545' }
    };
    const zone = zoneLabels[intensity];
    document.getElementById('hr-value').textContent = `${lowHR} - ${highHR} bpm`;
    document.getElementById('hr-label').textContent = `最大心率 ${maxHR} bpm · 目标区间 ${low}% - ${high}%`;
    const zoneEl = document.getElementById('hr-zone');
    zoneEl.textContent = `🏷 ${zone.name}`;
    zoneEl.style.background = zone.color;
    zoneEl.style.color = '#fff';
    resultEl.classList.add('show');
  }
};

/* ===== STUDY LOG ===== */
const LogModule = {
  STORAGE_KEY: 'nsca_study_log',

  init() {
    this.render();
    document.getElementById('study-save').addEventListener('click', () => this.saveManualLog());
    document.getElementById('log-clear').addEventListener('click', () => this.clearLogs());
  },

  getLogs() {
    try {
      const data = localStorage.getItem(this.STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  },

  saveLogs(logs) {
    try {
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(logs));
    } catch(e) {}
  },

  saveQuizResult(score, total) {
    const logs = this.getLogs();
    logs.unshift({ type: 'quiz', date: new Date().toISOString(), score, total });
    if (logs.length > 100) logs.length = 100;
    this.saveLogs(logs);
  },

  saveManualLog() {
    const minutes = parseInt(document.getElementById('study-minutes').value);
    if (isNaN(minutes) || minutes <= 0) {
      alert('请输入有效的学习时长（正数分钟）。');
      return;
    }
    const logs = this.getLogs();
    logs.unshift({ type: 'study', date: new Date().toISOString(), duration: minutes });
    if (logs.length > 100) logs.length = 100;
    this.saveLogs(logs);
    document.getElementById('study-minutes').value = '';
    this.render();
  },

  clearLogs() {
    if (!confirm('确定清除所有学习记录？此操作不可撤销。')) return;
    localStorage.removeItem(this.STORAGE_KEY);
    this.render();
  },

  formatDate(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  },

  render() {
    const logs = this.getLogs();
    const list = document.getElementById('log-list');
    const empty = document.getElementById('log-empty');
    const recent = logs.slice(0, 10);

    if (recent.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    let html = '';
    recent.forEach(log => {
      if (log.type === 'quiz') {
        html += `<li><span>${this.formatDate(log.date)} — 📝 测验得分：${log.score}/${log.total}</span></li>`;
      } else if (log.type === 'study') {
        html += `<li><span>${this.formatDate(log.date)} — ⏱ 学习时长：${log.duration} 分钟</span></li>`;
      }
    });
    list.innerHTML = html;
  }
};
