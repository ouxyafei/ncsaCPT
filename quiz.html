<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随堂测验 - NSCA-CPT</title>
<link rel="stylesheet" href="css/main.css">
<style>
  .quiz-q { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
  .quiz-opts { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt { width: 100%; text-align: left; padding: 14px 18px; border: 2px solid var(--border); border-radius: 8px; background: var(--card-bg); font-size: 0.95rem; cursor: pointer; transition: all 0.15s; color: var(--text); }
  .quiz-opt:not(.disabled):hover { border-color: var(--accent); background: var(--accent-light); }
  .quiz-opt.correct { border-color: var(--success); background: #d4edda; color: #155724; }
  .quiz-opt.incorrect { border-color: var(--danger); background: #f8d7da; color: #721c24; }
  .quiz-opt.disabled { pointer-events: none; opacity: 0.9; }
  .quiz-expl { margin-top: 14px; padding: 14px 18px; background: var(--info-bg); border-radius: 8px; font-size: 0.9rem; display: none; }
  .quiz-expl.show { display: block; }
  .quiz-next-btn { display: none; margin-top: 16px; }
  .quiz-next-btn.show { display: inline-block; }
  .score-area { text-align: center; padding: 30px 0; }
  .score-big { font-size: 3.5rem; font-weight: 800; color: var(--accent); }
  .review-item { padding: 14px 18px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--danger); background: var(--danger-bg); }
</style>
</head>
<body>
<div id="top-nav-container"></div>

<div class="page-container">
  <div class="card" style="min-height:400px;">
    <h2>📝 随堂测验</h2>
    <p style="color:var(--text-muted);margin-bottom:16px;">每次随机抽取10道单选题 · 即时反馈 · 错题回顾 · 成绩保存</p>
    <div id="quiz-area"><button class="btn btn-primary" id="quiz-start">开始测验</button></div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/quiz.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => { Shared.init('quiz'); Quiz.init(); });</script>
</body>
</html>
