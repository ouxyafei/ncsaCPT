<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闪卡记忆 - NSCA-CPT</title>
<link rel="stylesheet" href="css/main.css">
<style>
  .fc-container { max-width: 580px; margin: 0 auto; text-align: center; }
  .fc-scene { width: 100%; height: 300px; perspective: 1000px; cursor: pointer; margin: 20px 0 16px; }
  .fc-inner { width: 100%; height: 100%; position: relative; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
  .fc-inner.flipped { transform: rotateY(180deg); }
  .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .fc-front { background: var(--card-bg); font-size: 1.5rem; font-weight: 700; border: 3px solid var(--accent); }
  .fc-back { background: #2d2d2d; color: #f0f0f0; transform: rotateY(180deg); font-size: 0.95rem; line-height: 1.7; border: 3px solid var(--accent); }
  .fc-hint { position: absolute; bottom: 14px; font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }
  .fc-counter { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 4px; }
  .fc-nav { display: flex; gap: 12px; justify-content: center; }
  .fc-nav button { padding: 10px 28px; border-radius: 8px; font-weight: 600; border: none; background: var(--accent); color: #fff; cursor: pointer; transition: background 0.15s; font-size: 0.9rem; }
  .fc-nav button:hover { background: var(--accent-hover); }
  .fc-nav button:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="top-nav-container"></div>

<div class="page-container">
  <div class="card">
    <h2>🃏 闪卡记忆</h2>
    <p style="color:var(--text-muted);margin-bottom:8px;">点击卡片翻转查看定义 · 共内置40+个NSCA核心术语</p>
    <div class="fc-container">
      <div class="fc-counter" id="fc-counter">1 / 40+</div>
      <div class="fc-scene" id="fc-scene">
        <div class="fc-inner" id="fc-inner">
          <div class="fc-face fc-front"><span id="fc-term">点击开始</span><span class="fc-hint">点击卡片翻转</span></div>
          <div class="fc-face fc-back"><span id="fc-def"></span></div>
        </div>
      </div>
      <div class="fc-nav">
        <button id="fc-prev">◀ 上一张</button>
        <button id="fc-next">下一张 ▶</button>
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/flashcards.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => { Shared.init('flashcards'); Flashcards.init(); });</script>
</body>
</html>
